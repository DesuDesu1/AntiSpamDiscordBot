# Images
gateway:
  image:
    repository: ghcr.io/desudesu1/antispam-gateway
    tag: latest
    pullPolicy: Always
  replicaCount: 1

bot:
  image:
    repository: ghcr.io/desudesu1/antispam-bot
    tag: latest
    pullPolicy: Always
  replicaCount: 1

# Discord
discord:
  token: ""     # Set via --set or secrets
  ownerId: ""   # Your Discord user ID (enable Developer Mode → right-click yourself → Copy ID)

# At-rest encryption of stored message content (Discord developer policy)
encryption:
  key: ""       # base64-encoded 32-byte key; set via --set or secrets. Generate: openssl rand -base64 32

# Shared secret Gateway sends as X-Internal-Key when calling Bot's /internal/commands and
# /internal/interactions (slash commands + moderation clicks - see architecture note below).
internal:
  apiKey: ""    # Set via --set or secrets. Generate: openssl rand -base64 32

# Kafka carries only the message-ingestion stream (antispam.messages) - the one genuinely
# unbounded, bursty flow. Slash commands and moderation clicks (ban/release via button or
# reaction) go straight from Gateway to Bot over HTTP; they're moderator-rate and the interaction
# is already ack'd by the time Gateway calls Bot, so a broker buys nothing there.
kafka:
  enabled: true
  replicaCount: 1
  storage: 5Gi
  bootstrapServers: "antispam-kafka:9092"

# Redis
redis:
  enabled: true
  storage: 1Gi

# PostgreSQL
postgresql:
  enabled: true
  storage: 5Gi
  database: antispam
  username: antispam
  password: ""  # Set via --set or secrets

# Resources
resources:
  gateway:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  bot:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
